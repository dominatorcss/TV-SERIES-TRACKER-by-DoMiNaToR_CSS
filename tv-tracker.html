  <style>
    :root { --bg: #0a0a14; --card: #16162b; --accent: #00ffcc; }
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0a0a14 0%, #1a0033 100%);
      color: #e0e0ff;
      margin: 0; padding: 20px;
      min-height: 100vh;
    }
    header { text-align: center; margin-bottom: 30px; animation: glow 4s infinite alternate; }
    @keyframes glow { from { text-shadow: 0 0 20px #00ffcc; } to { text-shadow: 0 0 50px #ff00cc, 0 0 70px #00ffcc; } }
    h1 {
      font-size: 3.2rem;
      background: linear-gradient(90deg, #00ffcc, #ff00cc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .controls { max-width: 1600px; margin: 0 auto 20px; display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
    button, input, select { padding: 12px 16px; border: none; border-radius: 12px; background: #1e1e3a; color: white; }
    button { background: var(--accent); color: #000; font-weight: bold; cursor: pointer; }
    button:hover { transform: scale(1.05); }

    table { width: 100%; max-width: 1600px; margin: 0 auto; border-collapse: collapse; background: var(--card); border-radius: 20px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.6); }
    th, td { padding: 16px 20px; text-align: left; }
    th { background: linear-gradient(90deg, #1a0033, #2a1a4d); cursor: pointer; }
    tr { transition: 0.3s; cursor: pointer; }
    tr:hover { background: #252540; transform: scale(1.01); }

    .watching { color: #ffcc00; }
    .done { color: #00ff88; }
    .progress-container { width: 200px; height: 10px; background: #222; border-radius: 10px; overflow: hidden; }
    .progress-bar { height: 100%; background: linear-gradient(90deg, #00ffcc, #ff00cc); }
  </style>
</head>

      <button onclick="exportToExcel()">📥 Экспорт в Excel</button>
      <button onclick="clearFilters()">Сбросить</button>
    </div>

    <div id="stats" style="text-align:center; margin:25px 0; font-size:1.3rem;"></div>

    <table id="trackerTable">

    let editIndex = -1;

    function loadData() {
      const saved = localStorage.getItem('tvTrackerData');
      if (saved) seriesData = JSON.parse(saved);
    }

    function saveData() {
      localStorage.setItem('tvTrackerData', JSON.stringify(seriesData));
    }

    function renderTable(data) {
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = '';
      data.forEach((row, idx) => {
        const globalIdx = seriesData.indexOf(row);
        const tr = document.createElement('tr');
        tr.onclick = () => editRow(globalIdx);
        tr.innerHTML = `
          <td style="font-weight:600;">${row[0]}</td>
          <td>${row[1]}</td>
          <td>${row[2]}</td>
          <td><span class="${row[3]}" style="padding:6px 14px;border-radius:30px;font-weight:bold;">
            ${row[3]==='watching' ? '📺 Смотрю (*)' : '✅ Просмотрено (/)'}
          </span></td>
          <td><div class="progress-container"><div class="progress-bar" style="width:${row[4]}%"></div></div></td>
          <td class="${row[3]}">${row[5]||''}</td>
        `;
        tbody.appendChild(tr);
      });
      updateStats(data);
    }

    function updateStats(data) {
      const total = data.length;
      const watching = data.filter(r => r[3] === 'watching').length;
      document.getElementById('stats').innerHTML = `
        Всего сериалов: <b>${total}</b> | 
        <span style="color:#ffcc00">Смотрю: <b>${watching}</b></span> | 
        <span style="color:#00ff88">Просмотрено: <b>${total-watching}</b></span>
      `;
    }

    function filterTable() {
      const term = document.getElementById('search').value.toLowerCase();
      const status = document.getElementById('statusFilter').value;
      const filtered = seriesData.filter(r => 
        r[0].toLowerCase().includes(term) && (!status || r[3] === status)
      );
      renderTable(filtered);
    }

    function sortTable(col) {
      seriesData.sort((a,b) => col === 0 ? a[0].localeCompare(b[0], 'ru') : a[col] - b[col]);
      filterTable();
    }

    function showAddModal() {
      editIndex = -1;
      document.getElementById('modalTitle').textContent = '➕ Добавить новый сериал';
      document.getElementById('newTitle').value = '';
      document.getElementById('newSeason').value = '1';
      document.getElementById('newEpisode').value = '1';
      document.getElementById('newStatus').value = 'watching';
      document.getElementById('newProgress').value = '50';
      document.getElementById('newNotes').value = '';
      document.getElementById('modal').style.display = 'flex';
    }

    function editRow(index) {
      editIndex = index;
      const row = seriesData[index];
      document.getElementById('modalTitle').textContent = '✏️ Редактировать сериал';
      document.getElementById('newTitle').value = row[0];
      document.getElementById('newSeason').value = row[1];
      document.getElementById('newEpisode').value = row[2];
      document.getElementById('newStatus').value = row[3];
      document.getElementById('newProgress').value = row[4];
      document.getElementById('newNotes').value = row[5] || '';
      document.getElementById('modal').style.display = 'flex';
    }

    function saveEdit() {
      const title = document.getElementById('newTitle').value.trim();
      if (!title) return alert("Название обязательно!");

      const row = [
        title,
        parseInt(document.getElementById('newSeason').value) || 1,
        parseInt(document.getElementById('newEpisode').value) || 1,
        document.getElementById('newStatus').value,
        parseInt(document.getElementById('newProgress').value) || 50,
        document.getElementById('newNotes').value.trim()
      ];

      if (editIndex >= 0) {
        seriesData[editIndex] = row;
      } else {
        seriesData.unshift(row);
      }
      saveData();
      hideModal();
      filterTable();
    }

    function hideModal() {
      document.getElementById('modal').style.display = 'none';
    }

    function exportToExcel() {
      const data = seriesData.map(r => ({
        "Сериал": r[0],
        "Сезон": r[1],
        "Серия": r[2],
        "Статус": r[3] === "watching" ? "Смотрю (*)" : "Просмотрено (/)",
        "Прогресс %": r[4],
        "Заметки": r[5]
      }));
      const ws = XLSX.utils.json_to_sheet(data);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "TV Tracker");
      XLSX.writeFile(wb, `TV_Tracker_DoMiNaToR_${new Date().toISOString().slice(0,10)}.xlsx`);
    }

    function clearFilters() {
      document.getElementById('search').value = '';
      document.getElementById('statusFilter').value = '';
      renderTable(seriesData);
    }

    // Инициализация
    loadData();
    document.getElementById('search').addEventListener('input', filterTable);
    document.getElementById('statusFilter').addEventListener('change', filterTable);
    renderTable(seriesData);
  </script>
</body>
